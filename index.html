<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELEMENT_13</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
}

/* HERO */
.hero {
    position: relative;
    height: 100vh;
    overflow: hidden;
}

.bg-video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
    filter: brightness(0.4) blur(2px);
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3), #000);
}

.hero-content {
    position: relative;
    text-align: center;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
}

.hero-content h1 {
    font-size: 56px;
    letter-spacing: 8px;
}

.hero-content p {
    color: #ccc;
    font-size: 18px;
}

/* SOUND BUTTON */
.sound-btn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    padding: 10px 18px;
    border-radius: 30px;
    border: none;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.1);
    color: #fff;
    cursor: pointer;
    z-index: 3;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 60px;
}

.gallery img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border-radius: 16px;
    transition: 0.4s;
}

.gallery img:hover {
    transform: scale(1.08);
    box-shadow: 0 20px 50px rgba(255,255,255,0.15);
}

/* CONTACT SECTION */
.contact-info {
    text-align: center;
    padding: 80px 20px;
}

.contact-info h2 {
    font-size: 34px;
    margin-bottom: 10px;
}

.contact-info p {
    color: #aaa;
    margin-bottom: 30px;
}

/* BUTTONS */
.btn {
    display: inline-block;
    margin: 10px;
    padding: 14px 28px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

/* EMAIL */
.email-btn {
    background: #fff;
    color: #000;
}

/* WHATSAPP */
.whatsapp-btn {
    background: #25D366;
    color: #000;
}

/* VIBER */
.viber-btn {
    background: #7360F2;
    color: #fff;
}

.btn:hover {
    opacity: 0.8;
}

/* LIGHTBOX */
.lightbox {
    position: fixed;
    display: none;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    justify-content: center;
    align-items: center;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 12px;
}

/* FOOTER */
footer {
    text-align: center;
    color: #777;
    padding: 40px;
}
</style>
</head>

<body>

<header class="hero">

    <video id="bgVideo" autoplay muted loop playsinline class="bg-video">
        <source src="promo.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="hero-content">
        <h1>ELEMENT_13</h1>
        <p>High Definition Metal Photo Sublimation</p>
    </div>

    <button class="sound-btn" onclick="toggleSound()" id="soundBtn">
        🔇 Sound
    </button>

</header>

<section class="gallery">
  <img src="metal1.jpg" onclick="openImage(this.src)">
  <img src="metal2.jpg" onclick="openImage(this.src)">
  <img src="metal3.jpg" onclick="openImage(this.src)">
  <img src="metal4.png" onclick="openImage(this.src)">
</section>

<!-- CONTACT SECTION -->
<section class="contact-info">
    <h2>For Details Please Contact</h2>
    <p>Custom metal prints made to order. Message me directly.</p>

    <!-- EMAIL -->
    <a href="mailto:zedgina1982@gmail.com" class="btn email-btn">
        📧 Email
    </a>

    <!-- WHATSAPP -->
    <a href="https://wa.me/14164598802" target="_blank" class="btn whatsapp-btn">
        💬 WhatsApp
    </a>

    <!-- VIBER -->
    <a href="viber://chat?number=%2B14164598802" class="btn viber-btn">
        📱 Viber
    </a>
</section>

<footer>
    © 2026 ELEMENT_13 — All rights reserved
</footer>

<div class="lightbox" id="lightbox" onclick="closeImage()">
    <img id="lightbox-img">
</div>

<script>
function openImage(src) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = src;
}

function closeImage() {
    document.getElementById("lightbox").style.display = "none";
}

function toggleSound() {
    const video = document.getElementById("bgVideo");
    const btn = document.getElementById("soundBtn");

    video.muted = !video.muted;

    if (video.muted) {
        btn.innerText = "🔇 Sound";
    } else {
        btn.innerText = "🔊 Sound On";
        video.play();
    }
}
</script>

</body>
</html>
