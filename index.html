<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELEMENT_13</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
}

header {
    text-align: center;
    padding: 80px 20px 40px;
}

header h1 {
    font-size: 48px;
    letter-spacing: 6px;
}

header p {
    color: #aaa;
}

/* GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 40px;
}

.gallery img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 12px;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    cursor: pointer;
}

.gallery img:hover {
    transform: scale(1.08);
    box-shadow: 0 15px 40px rgba(255,255,255,0.15);
}

/* FULLSCREEN VIEW */
.lightbox {
    position: fixed;
    display: none;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

/* BUTTON */
.cta {
    text-align: center;
    margin: 60px 0;
}

.cta a {
    background: #fff;
    color: #000;
    padding: 14px 30px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

.cta a:hover {
    background: #ccc;
}

/* FOOTER */
footer {
    text-align: center;
    color: #777;
    padding: 30px;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
    <h1>ELEMENT_13</h1>
    <p>High Definition Metal Photo Sublimation</p>
</header>

<section class="gallery">
  <img src="metal1.jpg" onclick="openImage(this.src)">
  <img src="metal2.jpg" onclick="openImage(this.src)">
  <img src="metal3.jpg" onclick="openImage(this.src)">
  <img src="metal4.jpg" onclick="openImage(this.src)">
</section>

<div class="cta">
    <a href="mailto:your@email.com">Order Now</a>
</div>

<footer>
    © 2026 ELEMENT_13 — All rights reserved
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeImage()">
    <img id="lightbox-img">
</div>

<script>
function openImage(src) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = src;
}

function closeImage() {
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
